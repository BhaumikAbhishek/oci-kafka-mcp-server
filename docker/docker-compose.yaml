version: "3.8"

# Local Kafka cluster for development and testing.
# Usage: podman-compose -f docker/docker-compose.yaml up -d
# (Also works with: docker compose -f docker/docker-compose.yaml up -d)

services:
  kafka:
    image: docker.io/apache/kafka:3.9.0
    container_name: oci-kafka-mcp-dev
    ports:
      - "9092:9092"
    volumes:
      - ./kraft-server.properties:/mnt/kraft-server.properties:ro
    entrypoint: ["bash", "-c"]
    command:
      - |
        /opt/kafka/bin/kafka-storage.sh format -t MkU3OEVBNTcwNTJENDM2Qk -c /mnt/kraft-server.properties --ignore-formatted && exec /opt/kafka/bin/kafka-server-start.sh /mnt/kraft-server.properties
