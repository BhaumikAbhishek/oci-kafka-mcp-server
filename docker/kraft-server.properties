# KRaft mode server.properties for local development
# Used by the containerized Kafka broker (Podman/Docker)

process.roles=broker,controller
node.id=1
controller.quorum.voters=1@127.0.0.1:29093
controller.listener.names=CONTROLLER

# PLAINTEXT on 0.0.0.0 (needed for Podman port-forwarding from host)
# CONTROLLER on 127.0.0.1 (internal only — avoids 0.0.0.0 validation error)
listeners=PLAINTEXT://0.0.0.0:9092,CONTROLLER://127.0.0.1:29093
advertised.listeners=PLAINTEXT://localhost:9092
listener.security.protocol.map=PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
inter.broker.listener.name=PLAINTEXT

# Log dirs
log.dirs=/tmp/kraft-combined-logs

# Single-node dev settings
offsets.topic.replication.factor=1
transaction.state.log.replication.factor=1
transaction.state.log.min.isr=1
group.initial.rebalance.delay.ms=0

# Reasonable defaults
num.network.threads=3
num.io.threads=8
num.partitions=3
log.retention.hours=168
log.segment.bytes=1073741824
